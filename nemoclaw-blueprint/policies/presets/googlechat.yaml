preset:
  name: googlechat
  description: "Google Chat (Chat API) message send, service-account token exchange, and inbound JWT verification certs"

network_policies:
  googlechat:
    name: googlechat
    endpoints:
      # Chat REST API: send/update/delete messages and read spaces.
      - host: chat.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      # Service-account JWT -> OAuth access token exchange (google-auth-library).
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: POST, path: "/**" }
      # Public certificates used to verify inbound Chat / add-on JWT signatures.
      - host: www.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
