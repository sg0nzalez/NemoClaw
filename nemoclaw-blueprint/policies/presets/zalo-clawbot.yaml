preset:
  name: zalo-clawbot
  description: "Zalo ClawBot (owner-bound personal bot) — QR login + Bot Platform long-polling"

network_policies:
  zalo-clawbot:
    name: zalo-clawbot
    endpoints:
      # Runtime only: the @zalo-platforms/openclaw-zaloclawbot plugin drives a
      # persistent long-poll loop (getUpdates, GET) and sends replies (POST)
      # against the Zalo Bot Platform API. This is the sole egress the running
      # sandbox requires.
      - host: bot-api.zaloplatforms.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # NOTE: QR login/provisioning (bot.zaloplatforms.com) runs HOST-SIDE during
      # `nemoclaw onboard` (see src/lib/messaging/channels/zalo-clawbot/qr.ts) and
      # the captured bot token is seeded into the sandbox. The sandbox therefore
      # never contacts the login host, so it is deliberately omitted here to keep
      # sandbox egress minimal.
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
