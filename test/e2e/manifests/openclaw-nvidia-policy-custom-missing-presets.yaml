apiVersion: nemoclaw.io/v1
kind: NemoClawInstance
metadata:
  name: openclaw-nvidia-policy-custom-missing-presets
spec:
  setup:
    install:
      source: repo-current
    runtime:
      containerEngine: docker
      containerDaemon: running
    platform:
      os: ubuntu
      executionTarget: local
  onboarding:
    agent: openclaw
    provider: nvidia
    modelRoute: inference-local
    policyTier: balanced
    policyMode: custom
    policyPresets: []
    messaging: []
    lifecycle: policy-custom-missing-presets-negative
  state:
    workspaceRef: default
    credentialRefs:
      - NVIDIA_INFERENCE_API_KEY
