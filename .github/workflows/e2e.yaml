  issue-4434-tui-unreachable-inference:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',issue-4434-tui-unreachable-inference,') || contains(format(',{0},', inputs.targets), ',issue-4434-tui-unreachable-inference,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "issue-4434-tui-unreachable-inference"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/issue-4434-tui-unreachable-inference
      NEMOCLAW_CLI_BIN: ${{ github.workspace }}/bin/nemoclaw.js
      NEMOCLAW_RUN_LIVE_E2E: "1"
      NEMOCLAW_E2E_USE_HOSTED_INFERENCE: "1"
      NEMOCLAW_ISSUE_4434_LIVE: "1"
      NEMOCLAW_NON_INTERACTIVE: "1"
      NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
      OPENSHELL_GATEWAY: "nemoclaw"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # This free-standing job checks out and executes the PR target ref. It
      # keeps privileged host dependency setup inline in trusted workflow YAML
      # rather than loading a repo-local action from the target ref after
      # checkout. Only expect and iptables are allowed here: the TUI driver and
      # egress-isolation assertion require them. Workflow contract tests pin
      # the retry behavior and exact package list.
      - name: "Install issue #4434 host dependencies"
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::apt-get update failed after 3 attempts." >&2
              exit 1
            fi
            echo "::warning::apt-get update attempt ${attempt} failed; retrying." >&2
            sleep $((attempt * 5))
          done
          sudo apt-get install -y --no-install-recommends expect iptables

      - name: Authenticate to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials not configured; continuing with anonymous pulls."
            exit 0
          fi
          login_succeeded=0
          for attempt in 1 2 3; do
            if echo "${DOCKERHUB_TOKEN}" | timeout 30s docker login docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              login_succeeded=1
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "::warning::Docker Hub login attempt ${attempt} failed; retrying."
              sleep 5
            fi
          done
          if [[ "$login_succeeded" -ne 1 ]]; then
            echo "::warning::Docker Hub login failed after 3 attempts; continuing with anonymous pulls."
          fi

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Install OpenShell CLI
        run: bash scripts/install-openshell.sh

      - name: "Run issue #4434 TUI unreachable inference live test"
        env:
          NVIDIA_INFERENCE_API_KEY: ${{ secrets.NVIDIA_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:$PATH"
          if command -v openshell >/dev/null 2>&1; then
            OPENSHELL_BIN="$(command -v openshell)"
          elif [ -x "$HOME/.local/bin/openshell" ]; then
            OPENSHELL_BIN="$HOME/.local/bin/openshell"
          else
            echo "::error::OpenShell CLI not found after install"
            ls -la /usr/local/bin/openshell "$HOME/.local/bin/openshell" 2>&1 || true
            exit 1
          fi
          export OPENSHELL_BIN
          echo "Using OPENSHELL_BIN=$OPENSHELL_BIN"
          "$OPENSHELL_BIN" --version
          npx vitest run --project e2e-live \
            test/e2e/live/issue-4434-tui-unreachable-inference.test.ts \
            --silent=false --reporter=default

      - name: "Upload issue #4434 TUI unreachable inference artifacts"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-issue-4434-tui-unreachable-inference
          path: e2e-artifacts/live/issue-4434-tui-unreachable-inference/
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

