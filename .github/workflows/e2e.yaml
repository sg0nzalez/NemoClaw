              login_succeeded=1
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "::warning::Docker Hub login attempt ${attempt} failed; retrying."
              sleep 5
            fi
          done
          if [[ "$login_succeeded" -ne 1 ]]; then
            echo "::warning::Docker Hub login failed after 3 attempts; continuing with anonymous pulls."
