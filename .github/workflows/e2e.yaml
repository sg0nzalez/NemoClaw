name: E2E

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      targets:
        description: "Optional comma-separated typed target ids. Empty runs all supported live targets."
        required: false
        default: ""
        type: string
      jobs:
        description: "Optional comma-separated free-standing live E2E job ids. Empty runs default-enabled jobs only when targets is also empty; explicit-only jobs such as jetson-nvmap-gpu and sandbox-rlimits-connect are skipped unless selected."
        required: false
        default: ""
        type: string
      pr_number:
        description: Optional PR number for selective-dispatch result comments.
        required: false
        type: string
        default: ""
      post_to_slack:
        description: Post a selective-dispatch scorecard to the preview Slack route.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}-${{ inputs.targets || 'supported' }}-${{ inputs.jobs || 'all-jobs' }}
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      hermes_selected: ${{ steps.matrix.outputs.hermes_selected }}
      explicit_only_jobs: ${{ steps.matrix.outputs.explicit_only_jobs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - id: matrix
        name: Generate E2E target matrix
        env:
          JOBS: ${{ inputs.jobs }}
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          inventory_output="$(npx tsx tools/e2e/workflow-inventory.mts --shell)"
          allowed_jobs=""
          explicit_only_jobs_csv=""
          free_standing_targets_csv=""
          free_standing_target_jobs_csv=""
          seen_inventory_keys=","
          while IFS= read -r line || [ -n "${line}" ]; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            if [[ -z "${line}" || "${line}" == \#* ]]; then
              continue
            fi
            if [[ ! "${line}" =~ ^(allowed_jobs|explicit_only_jobs_csv|free_standing_targets_csv|free_standing_target_jobs_csv)=([A-Za-z0-9_:-]+(,[A-Za-z0-9_:-]+)*)?$ ]]; then
              echo "::error::free-standing workflow inventory must be data-only key=value" >&2
              exit 1
            fi
            inventory_key="${BASH_REMATCH[1]}"
            inventory_value="${BASH_REMATCH[2]}"
            if [[ "${seen_inventory_keys}" == *",${inventory_key},"* ]]; then
              echo "::error::free-standing workflow inventory must not redefine ${inventory_key}" >&2
              exit 1
            fi
            seen_inventory_keys="${seen_inventory_keys}${inventory_key},"
            case "${inventory_key}" in
              allowed_jobs) allowed_jobs="${inventory_value}" ;;
              explicit_only_jobs_csv) explicit_only_jobs_csv="${inventory_value}" ;;
              free_standing_targets_csv) free_standing_targets_csv="${inventory_value}" ;;
              free_standing_target_jobs_csv) free_standing_target_jobs_csv="${inventory_value}" ;;
            esac
          done <<< "${inventory_output}"
          for required_inventory_key in allowed_jobs explicit_only_jobs_csv free_standing_targets_csv free_standing_target_jobs_csv; do
            if [[ "${seen_inventory_keys}" != *",${required_inventory_key},"* ]]; then
              echo "::error::free-standing workflow inventory missing ${required_inventory_key}" >&2
              exit 1
            fi
          done
          for required_inventory_key in allowed_jobs free_standing_targets_csv free_standing_target_jobs_csv; do
            if [[ -z "${!required_inventory_key:-}" ]]; then
              echo "::error::free-standing workflow inventory missing ${required_inventory_key}" >&2
              exit 1
            fi
          done
          seen_allowed_jobs=","
          IFS=',' read -r -a allowed_job_entries <<< "${allowed_jobs}"
          for job in "${allowed_job_entries[@]}"; do
            if [[ ! "${job}" =~ ^[A-Za-z0-9_-]+$ ]]; then
              echo "::error::free-standing workflow inventory contains invalid job id" >&2
              exit 1
            fi
            if [[ "${seen_allowed_jobs}" == *",${job},"* ]]; then
              echo "::error::free-standing workflow inventory repeats job id" >&2
              exit 1
            fi
            seen_allowed_jobs="${seen_allowed_jobs}${job},"
          done
          seen_explicit_only_jobs=","
          if [ -n "${explicit_only_jobs_csv}" ]; then
            IFS=',' read -r -a explicit_only_job_entries <<< "${explicit_only_jobs_csv}"
            for job in "${explicit_only_job_entries[@]}"; do
              if [[ "${seen_allowed_jobs}" != *",${job},"* ]]; then
                echo "::error::Explicit-only job is not in allowed jobs" >&2
                exit 1
              fi
              if [[ "${seen_explicit_only_jobs}" == *",${job},"* ]]; then
                echo "::error::free-standing workflow inventory repeats explicit-only job" >&2
                exit 1
              fi
              seen_explicit_only_jobs="${seen_explicit_only_jobs}${job},"
            done
          fi
          seen_free_standing_targets=","
          IFS=',' read -r -a free_standing_target_entries <<< "${free_standing_targets_csv}"
          for target in "${free_standing_target_entries[@]}"; do
            if [[ ! "${target}" =~ ^[A-Za-z0-9_-]+$ ]]; then
              echo "::error::free-standing workflow inventory contains invalid target id" >&2
              exit 1
            fi
            if [[ "${seen_free_standing_targets}" == *",${target},"* ]]; then
              echo "::error::free-standing workflow inventory repeats target id" >&2
              exit 1
            fi
            seen_free_standing_targets="${seen_free_standing_targets}${target},"
          done
          IFS=',' read -r -a target_job_entries <<< "${free_standing_target_jobs_csv}"
          seen_target_mappings=","
          derived_free_standing_targets=()
          for entry in "${target_job_entries[@]}"; do
            if [[ ! "${entry}" =~ ^[A-Za-z0-9_-]+:[A-Za-z0-9_-]+$ ]]; then
              echo "::error::Invalid free-standing target mapping" >&2
              exit 1
            fi
            target="${entry%%:*}"
            job="${entry#*:}"
            if [[ "${seen_target_mappings}" == *",${target},"* ]]; then
              echo "::error::free-standing workflow inventory repeats target mapping" >&2
              exit 1
            fi
            seen_target_mappings="${seen_target_mappings}${target},"
            if [[ "${seen_allowed_jobs}" != *",${job},"* ]]; then
              echo "::error::Free-standing target maps to unknown job" >&2
              exit 1
            fi
            derived_free_standing_targets+=("${target}")
          done
          derived_free_standing_targets_csv="$(IFS=,; echo "${derived_free_standing_targets[*]}")"
          if [[ "${free_standing_targets_csv}" != "${derived_free_standing_targets_csv}" ]]; then
            echo "::error::free_standing_targets_csv must match target mapping keys" >&2
            exit 1
          fi
          args=(--emit-live-matrix)
          matrix=""
          hermes_selected=false
          registry_targets=()
          is_free_standing_target() {
            [[ ",${free_standing_targets_csv}," == *",$1,"* ]]
          }
          if [ -n "${JOBS}" ] && [ -n "${TARGETS}" ]; then
            echo "::error::Use either targets or jobs, not both." >&2
            exit 1
          fi
          if [ -n "${JOBS}" ]; then
            if [[ ! "${JOBS}" =~ ^[A-Za-z0-9_-]+(,[A-Za-z0-9_-]+)*$ ]]; then
              echo "::error::Invalid jobs input; use comma-separated job ids" >&2
              exit 1
            fi
            IFS=',' read -r -a selected_jobs <<< "${JOBS}"
            for job in "${selected_jobs[@]}"; do
              if [[ ",${allowed_jobs}," != *",${job},"* ]]; then
                echo "::error::Unknown free-standing E2E job: ${job}" >&2
                echo "::error::Allowed jobs: ${allowed_jobs}" >&2
                exit 1
              fi
              case "${job}" in
                hermes-e2e)
                  hermes_selected=true
                  ;;
              esac
            done
            matrix="[]"
          elif [ -n "${TARGETS}" ]; then
            if [[ ! "${TARGETS}" =~ ^[A-Za-z0-9_-]+(,[A-Za-z0-9_-]+)*$ ]]; then
              echo "::error::Invalid target input; use comma-separated target ids containing only letters, numbers, underscores, and hyphens." >&2
              exit 1
            fi
            IFS=',' read -r -a requested_targets <<< "${TARGETS}"
            for target in "${requested_targets[@]}"; do
              case "${target}" in
                hermes-e2e)
                  hermes_selected=true
                  ;;
              esac
              if is_free_standing_target "${target}"; then
                continue
              fi
              registry_targets+=("${target}")
            done
            if [ "${#registry_targets[@]}" -gt 0 ]; then
              registry_csv="$(IFS=,; echo "${registry_targets[*]}")"
              args+=(--targets "${registry_csv}")
              matrix="$(npx tsx test/e2e/registry/run.ts "${args[@]}")"
            else
              matrix="[]"
            fi
          else
            hermes_selected=true
            matrix="$(npx tsx test/e2e/registry/run.ts "${args[@]}")"
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "hermes_selected=${hermes_selected}" >> "$GITHUB_OUTPUT"
          echo "explicit_only_jobs=${explicit_only_jobs_csv}" >> "$GITHUB_OUTPUT"
          MATRIX_JSON="${matrix}" python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os

          rows = json.loads(os.environ["MATRIX_JSON"])
          print("## E2E Target Matrix")
          print()
          print("| Target | Runner | Label |")
          print("| --- | --- | --- |")
          for row in rows:
              print(f"| `{row['id']}` | `{row['runner']}` | {row['label']} |")
          PY

  live:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || inputs.jobs == '') && needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    env:
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live
      NEMOCLAW_CLI_BIN: ${{ github.workspace }}/bin/nemoclaw.js
      NEMOCLAW_RUN_LIVE_E2E: "1"
      NEMOCLAW_E2E_USE_HOSTED_INFERENCE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Run live E2E tests
        env:
          NVIDIA_INFERENCE_API_KEY: ${{ secrets.NVIDIA_INFERENCE_API_KEY }}
          TARGET_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          npx vitest run --project e2e-live test/e2e/live/registry-targets.test.ts -t "^${TARGET_ID}$" --silent=false --reporter=default

      - name: Summarize artifacts
        if: always()
        env:
          TARGET_ID: ${{ matrix.id }}
          TARGET_LABEL: ${{ matrix.label }}
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["E2E_ARTIFACT_DIR"]) / os.environ["TARGET_ID"]
          plan_path = root / "run-plan.json"
          print("## E2E Targets")
          print()
          print("- Project: `e2e-live`")
          print(f"- Target: `{os.environ['TARGET_ID']}`")
          print(f"- Label: `{os.environ['TARGET_LABEL']}`")
          print(f"- Artifact root: `{root}`")
          print()
          print("| Target | Manifest | Expected state | Suites | Phases |")
          print("| --- | --- | --- | --- | --- |")
          if plan_path.exists():
              plan = json.loads(plan_path.read_text(encoding="utf-8"))
              suites = ", ".join(plan.get("suiteIds") or []) or "(none)"
              phases = ", ".join(plan.get("phases") or []) or "(none)"
              print(
                  "| "
                  f"`{plan.get('targetId') or os.environ['TARGET_ID']}` | "
                  f"`{plan.get('manifestPath') or 'not-yet-defined'}` | "
                  f"`{plan.get('expectedStateId') or 'not-yet-defined'}` | "
                  f"{suites} | {phases} |"
              )
          else:
              print(
                  "| "
                  f"`{os.environ['TARGET_ID']}` | `(missing run-plan.json)` | "
                  "`(missing run-plan.json)` | `(missing)` | `(missing)` |"
              )
          PY

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-${{ matrix.id }}
          path: |
            e2e-artifacts/live/${{ matrix.id }}/run-plan.json
            e2e-artifacts/live/${{ matrix.id }}/target.json
            e2e-artifacts/live/${{ matrix.id }}/target-result.json
            e2e-artifacts/live/${{ matrix.id }}/environment.result.json
            e2e-artifacts/live/${{ matrix.id }}/onboarding.result.json
            e2e-artifacts/live/${{ matrix.id }}/state-validation.result.json
            e2e-artifacts/live/${{ matrix.id }}/actions/
            e2e-artifacts/live/${{ matrix.id }}/logs/
            e2e-artifacts/live/${{ matrix.id }}/shell/
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

  # Free-standing live tests under test/e2e/live/ that don't fit the
  # registry-driven steady-state probe model. Each gets a discrete job here
  # because the matrix above only runs registry-targets.test.ts. Modeled on
  # #5049's free-standing pattern.
  openshell-version-pin:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',openshell-version-pin,') || contains(format(',{0},', inputs.targets), ',openshell-version-pin,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "openshell-version-pin"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/openshell-version-pin
      NEMOCLAW_RUN_LIVE_E2E: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run OpenShell version-pin live test
        # Hermetic
        # installer-script behavioral test — no real network, no real install.
        run: |
          set -euo pipefail
          npx vitest run --project e2e-live \
            test/e2e/live/openshell-version-pin.test.ts \
            --silent=false --reporter=default

      - name: Upload OpenShell version-pin artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-openshell-version-pin
          path: e2e-artifacts/live/openshell-version-pin/
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

  onboard-negative-paths:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',onboard-negative-paths,') || contains(format(',{0},', inputs.targets), ',onboard-negative-paths,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "onboard-negative-paths"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/onboard-negative-paths
      NEMOCLAW_RUN_LIVE_E2E: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Run onboard negative-paths live test
        # Direct E2E coverage
        # invalid-key contract. This intentionally bypasses typed registry and
        # state-validation machinery because the behavior is CLI exit/output.
        run: |
          set -euo pipefail
          npx vitest run --project e2e-live \
            test/e2e/live/onboard-negative-paths.test.ts \
            --silent=false --reporter=default

      - name: Upload onboard negative-paths artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-onboard-negative-paths
          path: e2e-artifacts/live/onboard-negative-paths/
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

  # Live skill injection and real OpenClaw agent-turn contract.
  skill-agent:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',skill-agent,') || contains(format(',{0},', inputs.targets), ',skill-agent,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "skill-agent"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/skill-agent
      NEMOCLAW_CLI_BIN: ${{ github.workspace }}/bin/nemoclaw.js
      NEMOCLAW_RUN_LIVE_E2E: "1"
      NEMOCLAW_E2E_USE_HOSTED_INFERENCE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Authenticate to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials not configured; continuing with anonymous pulls."
            exit 0
          fi
          login_succeeded=0
          for attempt in 1 2 3; do
            if echo "${DOCKERHUB_TOKEN}" | timeout 30s docker login docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              login_succeeded=1
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "::warning::Docker Hub login attempt ${attempt} failed; retrying."
              sleep 5
            fi
          done
          if [[ "$login_succeeded" -ne 1 ]]; then
            echo "::warning::Docker Hub login failed after 3 attempts; continuing with anonymous pulls."
          fi

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Install OpenShell CLI
        # The migrated skill-agent lane invokes helper scripts that call
        # `openshell` after the repo CLI onboard command has returned. Install
        # and resolve OpenShell in the workflow parent so PATH/OPENSHELL_BIN is
        # available to both Vitest and the bash helpers.
        run: bash scripts/install-openshell.sh

      - name: Run skill-agent live test
        env:
          NVIDIA_INFERENCE_API_KEY: ${{ secrets.NVIDIA_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:$PATH"
          if command -v openshell >/dev/null 2>&1; then
            OPENSHELL_BIN="$(command -v openshell)"
          elif [ -x "$HOME/.local/bin/openshell" ]; then
            OPENSHELL_BIN="$HOME/.local/bin/openshell"
          else
            echo "::error::OpenShell CLI not found after install"
            ls -la /usr/local/bin/openshell "$HOME/.local/bin/openshell" 2>&1 || true
            exit 1
          fi
          export OPENSHELL_BIN
          echo "Using OPENSHELL_BIN=$OPENSHELL_BIN"
          "$OPENSHELL_BIN" --version
          npx vitest run --project e2e-live \
            test/e2e/live/skill-agent.test.ts \
            --silent=false --reporter=default

      - name: Upload skill-agent artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-skill-agent
          path: |
            e2e-artifacts/live/skill-agent/*/artifact-summary.json
            e2e-artifacts/live/skill-agent/*/cleanup.json
            e2e-artifacts/live/skill-agent/*/cleanup-skill-agent-summary.json
            e2e-artifacts/live/skill-agent/*/target.json
            e2e-artifacts/live/skill-agent/*/target-result.json
            e2e-artifacts/live/skill-agent/*/shell/*.result.json
            e2e-artifacts/live/skill-agent/*/shell/*.stdout.txt
            e2e-artifacts/live/skill-agent/*/shell/*.stderr.txt
          include-hidden-files: false
          if-no-files-found: ignore
          retention-days: 14

  # Direct OpenClaw skills CLI contract.
  openclaw-skill-cli:
    needs: generate-matrix
    if: ${{ (github.event_name != 'workflow_dispatch' || (inputs.jobs == '' && inputs.targets == '')) || contains(format(',{0},', inputs.jobs), ',openclaw-skill-cli,') || contains(format(',{0},', inputs.targets), ',openclaw-skill-cli,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_JOB: "1"
      E2E_TARGET_ID: "openclaw-skill-cli"
      E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/live/openclaw-skill-cli
      NEMOCLAW_CLI_BIN: ${{ github.workspace }}/bin/nemoclaw.js
      NEMOCLAW_RUN_LIVE_E2E: "1"
      NEMOCLAW_E2E_USE_HOSTED_INFERENCE: "1"
      NEMOCLAW_SANDBOX_NAME: "e2e-openclaw-skill-cli"
      OPENSHELL_GATEWAY: "nemoclaw"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Authenticate to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials not configured; continuing with anonymous pulls."
            exit 0
          fi
          login_succeeded=0
          for attempt in 1 2 3; do
            if echo "${DOCKERHUB_TOKEN}" | timeout 30s docker login docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              login_succeeded=1
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              echo "::warning::Docker Hub login attempt ${attempt} failed; retrying."
              sleep 5
            fi
          done
