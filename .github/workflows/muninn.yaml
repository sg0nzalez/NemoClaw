# Muninn all-in-one security scan. Findings are published to code scanning and
# PR comments; fail-on: info gates the check (see muninn.yml).
name: Security / Muninn

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  muninn:
    name: Muninn
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Muninn
        id: muninn
        # zizmor: ignore[github_action_from_unverified_creator_used]
        uses: skaldlab/muninn@365628a795478e870417bf9e395a0ecc63685442 # v0.3.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # fail-on comes from muninn.yml (single source of truth)
          format: sarif,comment

      - name: Upload SARIF
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: muninn.sarif
