name: CI / Codebase Growth Guardrails

# pull_request_target runs in the base repo context, so this policy cannot be
# bypassed by editing workflow files or scripts in the PR. Keep this workflow
# data-only: do not check out or execute PR code. It only reads GitHub's
# file-level diff metadata.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  codebase-growth-guardrails:
    name: codebase-growth-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Block newly added JavaScript files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          rows="$(gh api --paginate "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | select((.filename | test("\\.(js|cjs|mjs)$")) and (.status == "added" or (.status == "renamed" and ((.previous_filename // "") | test("\\.(js|cjs|mjs)$") | not)))) | [.status, .filename, (.previous_filename // "")] | @tsv')"

          if [ -z "$rows" ]; then
            echo "PASS: no newly added .js, .cjs, or .mjs files."
            exit 0
          fi

          cat <<'EOF'
          FAIL: this PR adds JavaScript source files.

          NemoClaw is standardizing on TypeScript for new Node.js code. Please
          use .ts for new source, test, and script files instead of .js, .cjs,
          or .mjs. Existing JavaScript files may still be modified or deleted.

          Blocked files:
          EOF
          while IFS=$'\t' read -r file_status file_path previous_path; do
            if [ -n "$previous_path" ]; then
              echo "          - ${file_path} (${file_status} from ${previous_path})"
            else
              echo "          - ${file_path} (${file_status})"
            fi
          done <<< "$rows"
          exit 1

      - name: Require src/lib/onboard.ts to be net-neutral or smaller
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TARGET_FILE: src/lib/onboard.ts
          EXTRACTION_DIR: src/lib/onboard/
        run: |
          set -euo pipefail

          # Intentionally hard-code TARGET_FILE in the jq expression. gh's jq
          # filter does not accept shell variables directly, and missing
          # previous_filename values must not match every file.
          rows="$(gh api --paginate "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | select(.filename == "src/lib/onboard.ts" or .previous_filename == "src/lib/onboard.ts") | [.additions, .deletions, .filename] | @tsv')"

          if [ -z "$rows" ]; then
            echo "${TARGET_FILE} was not changed. New modules under ${EXTRACTION_DIR} are allowed."
            exit 0
          fi

          additions=0
          deletions=0
          while IFS=$'\t' read -r file_additions file_deletions _file_path; do
            if [ -z "${file_additions:-}" ]; then
              continue
            fi
            additions=$((additions + file_additions))
            deletions=$((deletions + file_deletions))
          done <<< "$rows"

          net=$((additions - deletions))
          echo "${TARGET_FILE}: +${additions}/-${deletions} (net ${net})"
          echo "Growth under ${EXTRACTION_DIR} is allowed; this budget applies only to ${TARGET_FILE}."

          if [ "$additions" -le "$deletions" ]; then
            echo "PASS: ${TARGET_FILE} is net-neutral or smaller."
            exit 0
          fi

          cat <<EOF
          FAIL: ${TARGET_FILE} grew by ${net} line(s).

          ${TARGET_FILE} is already about 12k lines. Please move new logic into
          focused modules under ${EXTRACTION_DIR}, or reduce ${TARGET_FILE} by at
          least as many lines as this PR adds there.

          This check allows src/lib/onboard/** to grow. It only blocks net growth
          in the top-level onboard entrypoint.
          EOF
          exit 1

      - name: Require changed test files to stay within size budget
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          node <<'NODE'
          // Fetch every blob we need in batched GraphQL queries instead of N
          // sequential REST /contents/ calls. Each REST call has no retry and
          // the endpoint intermittently returns 5xx; N calls per run compounded
          // that flake into a ~30-50% job failure rate on fork PRs. This step
          // now issues ~2 GraphQL requests (BASE budget + one batched HEAD
          // query for budget/legacy/changed files) and retries each outbound
          // request on 5xx and network errors. Behaviour is otherwise
          // identical to the previous implementation.
          const BUDGET_FILE = "ci/test-file-size-budget.json";
          const FALLBACK_BUDGET = '{"defaultMaxLines":1500,"legacyMaxLines":{}}';
          const TEST_FILE_RE = /^(test|src|nemoclaw\/src)\/.*\.(test|spec)\.(ts|js|mts|mjs|cts|cjs)$/;
          const GRAPHQL_URL = "https://api.github.com/graphql";
          const GRAPHQL_BATCH_SIZE = 25;
          const RETRY_ATTEMPTS = 4;
          const RETRY_BASE_MS = 250;
          const RETRY_MAX_MS = 4000;
          const { BASE_SHA, GH_TOKEN, HEAD_REPO, HEAD_SHA, PR_NUMBER, REPO } = process.env;
          const headers = { Authorization: `Bearer ${GH_TOKEN}`, "X-GitHub-Api-Version": "2022-11-28" };
          const violations = [];

          function countLines(text) {
            return text === "" ? 0 : (text.match(/\r\n|\r|\n/g)?.length ?? 0) + (/(?:\r\n|\r|\n)$/.test(text) ? 0 : 1);
          }

          function parseBudget(text, label) {
            const budget = JSON.parse(text);
            const legacyMaxLines = budget.legacyMaxLines ?? {};
            if (!Number.isInteger(budget.defaultMaxLines) || budget.defaultMaxLines <= 0) {
              throw new Error(`${label} must define positive integer defaultMaxLines`);
            }
            if (typeof legacyMaxLines !== "object" || legacyMaxLines === null || Array.isArray(legacyMaxLines)) {
              throw new Error(`${label} legacyMaxLines must be an object`);
            }
            for (const [file, maxLines] of Object.entries(legacyMaxLines)) {
              if (!Number.isInteger(maxLines) || maxLines <= 0) {
                throw new Error(`${label} has invalid legacy budget for ${file}: ${maxLines}`);
              }
            }
            return { defaultMaxLines: budget.defaultMaxLines, legacyMaxLines };
          }

          function isTransient(status) {
            return status === 408 || status === 425 || status === 429 || (status >= 500 && status <= 599);
          }

          async function withRetry(label, fn) {
            let lastError;
            for (let attempt = 1; attempt <= RETRY_ATTEMPTS; attempt += 1) {
              try {
                return await fn();
              } catch (error) {
                lastError = error;
                const retriable = error && (error.transient === true || /HTTP (408|425|429|5\d{2})/.test(String(error.message ?? "")));
                if (!retriable || attempt === RETRY_ATTEMPTS) throw error;
                const jitter = Math.random() * RETRY_BASE_MS;
                const delay = Math.min(RETRY_MAX_MS, RETRY_BASE_MS * 2 ** (attempt - 1)) + jitter;
                console.error(`retry: ${label} attempt ${attempt} failed (${error.message}); sleeping ${Math.round(delay)}ms`);
                await new Promise((resolve) => setTimeout(resolve, delay));
              }
            }
            throw lastError;
          }

          async function requestJson(url, init) {
            let response;
            try {
              response = await fetch(url, init);
            } catch (error) {
              const wrapped = new Error(`${url}: network error ${error?.message ?? error}`);
              wrapped.transient = true;
              throw wrapped;
            }
            if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
            return response.json();
          }

          async function getJson(url) {
            return withRetry(url, () => requestJson(url, { headers }));
          }

          async function graphql(query, variables) {
            const body = JSON.stringify({ query, variables });
            const label = `graphql ${variables?.owner ?? ""}/${variables?.name ?? ""}@${variables?.oid ?? ""}`;
            return withRetry(label, async () => {
              const payload = await requestJson(GRAPHQL_URL, {
                method: "POST",
                headers: { ...headers, "Content-Type": "application/json" },
                body,
              });
              if (Array.isArray(payload.errors) && payload.errors.length > 0) {
                const messages = payload.errors.map((entry) => entry.message).join("; ");
                const transient = payload.errors.some((entry) => entry.type === "RATE_LIMITED" || /timed? *out|unavailable|internal/i.test(entry.message ?? ""));
                const error = new Error(`${label}: GraphQL errors: ${messages}`);
                if (transient) error.transient = true;
                throw error;
              }
              return payload.data;
            });
          }

          async function getPullFiles() {
            const files = [];
            for (let page = 1; ; page += 1) {
              const batch = await getJson(`https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100&page=${page}`);
              files.push(...batch);
              if (batch.length < 100) return files;
            }
          }

          function splitRepoName(fullName) {
            const [owner, name] = fullName.split("/");
            if (!owner || !name) throw new Error(`Unexpected repository full name: ${fullName}`);
            return { owner, name };
          }

          function buildBlobQuery(paths) {
            const aliases = paths.map((_, index) => `      f${index}: object(expression: $e${index}) { __typename ... on Blob { text isBinary isTruncated byteSize } }`).join("\n");
            const params = paths.map((_, index) => `$e${index}: String!`).join(", ");
            return `query($owner: String!, $name: String!, ${params}) {\n  repository(owner: $owner, name: $name) {\n${aliases}\n  }\n}`;
          }

          async function fetchBlobs(repoFullName, oid, paths) {
            const results = new Map();
            if (paths.length === 0) return results;
            const { owner, name } = splitRepoName(repoFullName);
            const rest = [];
            for (let start = 0; start < paths.length; start += GRAPHQL_BATCH_SIZE) {
              const chunk = paths.slice(start, start + GRAPHQL_BATCH_SIZE);
              const query = buildBlobQuery(chunk);
              const variables = { owner, name, oid };
              chunk.forEach((path, index) => { variables[`e${index}`] = `${oid}:${path}`; });
              const data = await graphql(query, variables);
              const repository = data?.repository;
              if (!repository) throw new Error(`GraphQL repository not found: ${repoFullName}`);
              chunk.forEach((path, index) => {
                const node = repository[`f${index}`];
                if (!node) { results.set(path, null); return; }
                if (node.__typename !== "Blob") { results.set(path, null); return; }
                if (node.isBinary) throw new Error(`${path} is binary; refusing to line-count`);
                if (node.text === null || node.isTruncated) { rest.push(path); return; }
                results.set(path, node.text);
              });
            }
            for (const path of rest) {
              const text = await getContentViaRest(repoFullName, oid, path);
              results.set(path, text);
            }
            return results;
          }

          async function getContentViaRest(repo, ref, file) {
            const encodedPath = file.split("/").map(encodeURIComponent).join("/");
            const url = `https://api.github.com/repos/${repo}/contents/${encodedPath}?ref=${encodeURIComponent(ref)}`;
            return withRetry(url, async () => {
              let response;
              try {
                response = await fetch(url, { headers });
              } catch (error) {
                const wrapped = new Error(`${url}: network error ${error?.message ?? error}`);
                wrapped.transient = true;
                throw wrapped;
              }
              if (response.status === 404) return null;
              if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
              const body = await response.json();
              if (body.type !== "file" || body.encoding !== "base64" || typeof body.content !== "string") {
                throw new Error(`Could not decode file contents for ${file}`);
              }
              return Buffer.from(body.content.replace(/\s/g, ""), "base64").toString("utf8");
            });
          }

          async function main() {
            const files = await getPullFiles();
            const budgetChanged = files.some(({ filename, previous_filename }) => filename === BUDGET_FILE || previous_filename === BUDGET_FILE);
            const changedTests = files.filter(({ filename, status }) => status !== "removed" && TEST_FILE_RE.test(filename));

            // Base budget lives in the trusted base repo; fetch it alone so we
            // can parse legacy entries before deciding which HEAD blobs to load.
            const [baseBlobs] = await Promise.all([
              fetchBlobs(REPO, BASE_SHA, [BUDGET_FILE]),
            ]);
            const baseText = baseBlobs.get(BUDGET_FILE);
            const baseWasFallback = baseText == null;
            const baseBudget = parseBudget(baseText ?? FALLBACK_BUDGET, "base budget");

            // Assemble every HEAD path we still need in one deduplicated batch:
            // budget (only if the PR changed it), each HEAD legacy file, each
            // BASE legacy file that HEAD dropped, and each changed test file.
            const headPaths = new Set();
            if (budgetChanged) headPaths.add(BUDGET_FILE);
            // Placeholder; we resolve headBudget after fetching HEAD budget below.
            let headBudget = baseBudget;

            if (budgetChanged) {
              const headBudgetBlobs = await fetchBlobs(HEAD_REPO, HEAD_SHA, [BUDGET_FILE]);
              const headText = headBudgetBlobs.get(BUDGET_FILE);
              if (headText == null) throw new Error(`${BUDGET_FILE} must remain present and parseable at the PR head`);
              headBudget = parseBudget(headText, "head budget");
            }

            for (const file of Object.keys(headBudget.legacyMaxLines)) headPaths.add(file);
            for (const file of Object.keys(baseBudget.legacyMaxLines)) {
              if (headBudget.legacyMaxLines[file] === undefined) headPaths.add(file);
            }
            for (const { filename } of changedTests) headPaths.add(filename);

            const headBlobs = await fetchBlobs(HEAD_REPO, HEAD_SHA, Array.from(headPaths));

            if (!baseWasFallback) {
              if (headBudget.defaultMaxLines > baseBudget.defaultMaxLines) {
                violations.push(`defaultMaxLines increased from ${baseBudget.defaultMaxLines} to ${headBudget.defaultMaxLines}`);
              }
              for (const [file, baseMax] of Object.entries(baseBudget.legacyMaxLines)) {
                const headMax = headBudget.legacyMaxLines[file];
                if (headMax !== undefined && headMax > baseMax) {
                  violations.push(`${file} legacy budget increased from ${baseMax} to ${headMax}`);
                }
                if (headMax === undefined) {
                  const text = headBlobs.get(file);
                  if (text != null && countLines(text) > headBudget.defaultMaxLines) {
                    violations.push(`${file} removed its legacy budget while still exceeding defaultMaxLines`);
                  }
                }
              }
              for (const [file, headMax] of Object.entries(headBudget.legacyMaxLines)) {
                if (baseBudget.legacyMaxLines[file] === undefined && headMax > headBudget.defaultMaxLines) {
                  violations.push(`${file} adds a new legacy budget (${headMax}) above defaultMaxLines (${headBudget.defaultMaxLines})`);
                }
                const text = headBlobs.get(file);
                if (text == null) {
                  violations.push(`${file} has a legacy budget but no matching test file at the PR head`);
                  continue;
                }
                const lines = countLines(text);
                if (lines > headMax) violations.push(`${file} has ${lines} line(s), above its legacy budget ${headMax}`);
                if (lines < headMax) violations.push(`${file}: ${lines} line(s) < ${headMax} legacy budget; lower the budget entry`);
              }
            }

            for (const { filename } of changedTests) {
              const text = headBlobs.get(filename);
              if (text == null) throw new Error(`Changed test file ${filename} was not found at the PR head`);
              const lines = countLines(text);
              const maxLines = headBudget.legacyMaxLines[filename] ?? headBudget.defaultMaxLines;
              if (lines > maxLines) violations.push(`${filename}: ${lines} line(s) > ${maxLines}`);
            }

            if (violations.length > 0) {
              console.error("FAIL: test size budget policy would be weakened or exceeded.");
              for (const violation of violations) console.error(`- ${violation}`);
              process.exit(1);
            }
            console.log(`PASS: test size budget policy is monotonic and ${changedTests.length} changed test file(s) are within budget.`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Require changed test files not to add if statements
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const TEST_FILE_RE = /^(test|src|nemoclaw\/src)\/.*\.(test|spec)\.(?:[cm]?[jt]s)$/;
          const GRAPHQL_URL = "https://api.github.com/graphql";
          const GRAPHQL_BATCH_SIZE = 25;
          const RETRY_ATTEMPTS = 4;
          const RETRY_BASE_MS = 250;
          const RETRY_MAX_MS = 4000;
          const { BASE_SHA, GH_TOKEN, HEAD_REPO, HEAD_SHA, PR_NUMBER, REPO } = process.env;
          const headers = { Authorization: `Bearer ${GH_TOKEN}`, "X-GitHub-Api-Version": "2022-11-28" };

          async function withRetry(label, fn) {
            let lastError;
            for (let attempt = 1; attempt <= RETRY_ATTEMPTS; attempt += 1) {
              try {
                return await fn();
              } catch (error) {
                lastError = error;
                const retriable = error && (error.transient === true || /HTTP (408|425|429|5\d{2})/.test(String(error.message ?? "")));
                if (!retriable || attempt === RETRY_ATTEMPTS) throw error;
                const jitter = Math.random() * RETRY_BASE_MS;
                const delay = Math.min(RETRY_MAX_MS, RETRY_BASE_MS * 2 ** (attempt - 1)) + jitter;
                console.error(`retry: ${label} attempt ${attempt} failed (${error.message}); sleeping ${Math.round(delay)}ms`);
                await new Promise((resolve) => setTimeout(resolve, delay));
              }
            }
            throw lastError;
          }

          async function requestJson(url, init) {
            let response;
            try {
              response = await fetch(url, init);
            } catch (error) {
              const wrapped = new Error(`${url}: network error ${error?.message ?? error}`);
              wrapped.transient = true;
              throw wrapped;
            }
            if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
            return response.json();
          }

          async function getJson(url) {
            return withRetry(url, () => requestJson(url, { headers }));
          }

          async function graphql(query, variables) {
            const body = JSON.stringify({ query, variables });
            const label = `graphql ${variables.owner}/${variables.name}@${variables.oid}`;
            return withRetry(label, async () => {
              const payload = await requestJson(GRAPHQL_URL, {
                method: "POST",
                headers: { ...headers, "Content-Type": "application/json" },
                body,
              });
              if (Array.isArray(payload.errors) && payload.errors.length > 0) {
                const messages = payload.errors.map((entry) => entry.message).join("; ");
                const transient = payload.errors.some((entry) => entry.type === "RATE_LIMITED" || /timed? *out|unavailable|internal/i.test(entry.message ?? ""));
                const error = new Error(`${label}: GraphQL errors: ${messages}`);
                if (transient) error.transient = true;
                throw error;
              }
              return payload.data;
            });
          }

          async function getPullFiles() {
            const files = [];
            for (let page = 1; ; page += 1) {
              const batch = await getJson(`https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100&page=${page}`);
              files.push(...batch);
              if (batch.length < 100) return files;
            }
          }

          async function getContentViaRest(repo, ref, file) {
            if (!file) return null;
            const encodedPath = file.split("/").map(encodeURIComponent).join("/");
            const url = `https://api.github.com/repos/${repo}/contents/${encodedPath}?ref=${encodeURIComponent(ref)}`;
            return withRetry(url, async () => {
              let response;
              try {
                response = await fetch(url, { headers });
              } catch (error) {
                const wrapped = new Error(`${url}: network error ${error?.message ?? error}`);
                wrapped.transient = true;
                throw wrapped;
              }
              if (response.status === 404) return null;
              if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
              const body = await response.json();
              if (body.type !== "file" || body.encoding !== "base64" || typeof body.content !== "string") {
                throw new Error(`Could not decode file contents for ${file}`);
              }
              return Buffer.from(body.content.replace(/\s/g, ""), "base64").toString("utf8");
            });
          }

          function splitRepoName(fullName) {
            const [owner, name] = fullName.split("/");
            if (!owner || !name) throw new Error(`Unexpected repository full name: ${fullName}`);
            return { owner, name };
          }

          function buildBlobQuery(paths) {
            const aliases = paths.map((_, index) => `      f${index}: object(expression: $e${index}) { __typename ... on Blob { text isBinary isTruncated byteSize } }`).join("\n");
            const params = paths.map((_, index) => `$e${index}: String!`).join(", ");
            return `query($owner: String!, $name: String!, ${params}) {\n  repository(owner: $owner, name: $name) {\n${aliases}\n  }\n}`;
          }

          async function fetchBlobs(repoFullName, oid, paths) {
            const results = new Map();
            if (paths.length === 0) return results;
            const { owner, name } = splitRepoName(repoFullName);
            const rest = [];
            for (let start = 0; start < paths.length; start += GRAPHQL_BATCH_SIZE) {
              const chunk = paths.slice(start, start + GRAPHQL_BATCH_SIZE);
              const query = buildBlobQuery(chunk);
              const variables = { owner, name, oid };
              chunk.forEach((path, index) => { variables[`e${index}`] = `${oid}:${path}`; });
              const data = await graphql(query, variables);
              const repository = data?.repository;
              if (!repository) throw new Error(`GraphQL repository not found: ${repoFullName}`);
              chunk.forEach((path, index) => {
                const node = repository[`f${index}`];
                if (!node) { results.set(path, null); return; }
                if (node.__typename !== "Blob") { results.set(path, null); return; }
                if (node.isBinary) throw new Error(`${path} is binary; refusing to count if statements`);
                if (node.text === null || node.isTruncated) { rest.push(path); return; }
                results.set(path, node.text);
              });
            }
            for (const path of rest) {
              results.set(path, await getContentViaRest(repoFullName, oid, path));
            }
            return results;
          }

          function assertRepositoryName(repo, label) {
            if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repo ?? "")) {
              throw new Error(`${label} must be an owner/name repository name`);
            }
          }

          function stripTriviaAndLiterals(text) {
            let output = "";
            let index = 0;
            let previousToken = "";
            let identifierBuffer = "";
            let lastIdentifier = "";

            function finalizeIdentifier() {
              if (identifierBuffer !== "") {
                lastIdentifier = identifierBuffer;
                identifierBuffer = "";
              }
            }

            function appendCode(char) {
              output += char;
              if (/[A-Za-z0-9_$]/.test(char)) {
                identifierBuffer += char;
              } else {
                finalizeIdentifier();
              }
              if (/\S/.test(char)) previousToken = char;
            }

            function consumeQuoted(quote) {
              output += " ";
              index += 1;
              while (index < text.length) {
                const char = text[index];
                if (char === "\\") {
                  index += 2;
                } else if (char === quote) {
                  index += 1;
                  return;
                } else {
                  index += 1;
                }
              }
            }

            function consumeTemplate() {
              output += " ";
              index += 1;
              while (index < text.length) {
                const char = text[index];
                const next = text[index + 1];
                if (char === "\\") {
                  index += 2;
                } else if (char === "`") {
                  index += 1;
                  return;
                } else if (char === "$" && next === "{") {
                  output += " ";
                  index += 2;
                  consumeTemplateExpression();
                } else {
                  index += 1;
                }
              }
            }

            function consumeTemplateExpression() {
              let depth = 1;
              while (index < text.length && depth > 0) {
                const char = text[index];
                const next = text[index + 1];
                if (char === "/" && next === "/") {
                  output += " ";
                  index += 2;
                  while (index < text.length && !/[\r\n]/.test(text[index])) index += 1;
                } else if (char === "/" && next === "*") {
                  output += " ";
                  index += 2;
                  while (index < text.length && !(text[index] === "*" && text[index + 1] === "/")) index += 1;
                  index = Math.min(index + 2, text.length);
                } else if (char === '"' || char === "'") {
                  consumeQuoted(char);
                } else if (char === "`") {
                  consumeTemplate();
                } else if (char === "/" && regexCanStart()) {
                  consumeRegex();
                } else if (char === "{") {
                  depth += 1;
                  appendCode(char);
                  index += 1;
                } else if (char === "}") {
                  depth -= 1;
                  if (depth === 0) {
                    output += " ";
                    index += 1;
                  } else {
                    appendCode(char);
                    index += 1;
                  }
                } else {
                  appendCode(char);
                  index += 1;
                }
              }
            }

            function regexCanStart() {
              const expressionKeyword = identifierBuffer || lastIdentifier;
              return (
                previousToken === "" ||
                /[({[=,:;!&|?+\-*~^%<>]/.test(previousToken) ||
                /^(?:return|throw|case|delete|void|typeof|yield|await|else|do)$/.test(expressionKeyword)
              );
            }

            function consumeRegex() {
              output += " ";
              index += 1;
              let inCharacterClass = false;
              while (index < text.length) {
                const char = text[index];
                if (char === "\\") {
                  index += 2;
                } else if (char === "[") {
                  inCharacterClass = true;
                  index += 1;
                } else if (char === "]") {
                  inCharacterClass = false;
                  index += 1;
                } else if (char === "/" && !inCharacterClass) {
                  index += 1;
                  while (/[a-z]/i.test(text[index] ?? "")) index += 1;
                  return;
                } else {
                  index += 1;
                }
              }
            }

            while (index < text.length) {
              const char = text[index];
              const next = text[index + 1];
              if (char === "/" && next === "/") {
                output += " ";
                index += 2;
                while (index < text.length && !/[\r\n]/.test(text[index])) index += 1;
              } else if (char === "/" && next === "*") {
                output += " ";
                index += 2;
                while (index < text.length && !(text[index] === "*" && text[index + 1] === "/")) index += 1;
                index = Math.min(index + 2, text.length);
              } else if (char === '"' || char === "'") {
                consumeQuoted(char);
              } else if (char === "`") {
                consumeTemplate();
              } else if (char === "/" && regexCanStart()) {
                consumeRegex();
              } else {
                appendCode(char);
                index += 1;
              }
            }
            return output;
          }

          function countIfStatements(text) {
            return stripTriviaAndLiterals(text).match(/\bif\s*\(/g)?.length ?? 0;
          }

          function countText(text) {
            return text === null ? 0 : countIfStatements(text);
          }

          async function main() {
            const files = await getPullFiles();
            const changedTests = files.filter(({ filename, previous_filename }) => (
              TEST_FILE_RE.test(filename) || TEST_FILE_RE.test(previous_filename ?? "")
            ));
            assertRepositoryName(REPO, "REPO");
            assertRepositoryName(HEAD_REPO, "HEAD_REPO");

            const basePaths = [...new Set(changedTests.map((file) => (
              TEST_FILE_RE.test(file.previous_filename ?? "") ? file.previous_filename : file.filename
            )))];
            const headPaths = [...new Set(changedTests
              .filter((file) => file.status !== "removed" && TEST_FILE_RE.test(file.filename))
              .map((file) => file.filename))];
            const [baseBlobs, headBlobs] = await Promise.all([
              fetchBlobs(REPO, BASE_SHA, basePaths),
              fetchBlobs(HEAD_REPO, HEAD_SHA, headPaths),
            ]);

            const details = [];
            let baseTotal = 0;
            let headTotal = 0;

            for (const file of changedTests) {
              const basePath = TEST_FILE_RE.test(file.previous_filename ?? "") ? file.previous_filename : file.filename;
              const headPath = file.status === "removed" || !TEST_FILE_RE.test(file.filename) ? null : file.filename;
              const baseCount = countText(baseBlobs.get(basePath) ?? null);
              const headCount = countText(headPath === null ? null : (headBlobs.get(headPath) ?? null));
              baseTotal += baseCount;
              headTotal += headCount;
              if (headCount > baseCount) {
                details.push(`${headPath ?? file.filename}: ${headCount} if statement(s), up from ${baseCount}`);
              }
            }

            if (details.length > 0) {
              console.error("FAIL: changed test files add if statements.");
              console.error(`Changed test files contain ${headTotal} if statement(s) at PR head vs ${baseTotal} at base.`);
              console.error("");
              console.error("Test bodies should stay linear. Split conditional behavior into separate test cases, use it.skipIf/it.runIf for platform or environment gates, or move non-asserting setup branches into named helpers.");
              console.error("");
              console.error("Files with increased if counts:");
              for (const detail of details) console.error(`- ${detail}`);
              console.error("");
              console.error("Run locally: npm run test-conditionals:scan -- --top 25");
              process.exit(1);
            }

            console.log(`PASS: changed test files did not add if statements (${headTotal} at PR head vs ${baseTotal} at base).`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
