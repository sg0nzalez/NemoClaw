name: CI / Station Hardware Evidence

# This policy runs from the trusted base revision. It reads PR metadata and
# linked GitHub comments, but never checks out or executes PR-controlled code.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [edited, deleted]

permissions: {}

concurrency:
  group: station-hardware-evidence-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  station-hardware-evidence:
    name: Station / Hardware Evidence
    if: ${{ github.event_name == 'pull_request_target' && github.repository == 'NVIDIA/NemoClaw' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Check out trusted gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22.19.0"

      - name: Validate Station evidence contract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node --experimental-strip-types tools/station-hardware-evidence/gate.mts

  revalidate-edited-comment:
    name: Revalidate edited Station evidence comment
    if: ${{ github.event_name == 'issue_comment' && github.repository == 'NVIDIA/NemoClaw' && github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Check out trusted gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22.19.0"

      - name: Revalidate Station evidence contract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PUBLISH_HEAD_CHECK: "true"
        run: node --experimental-strip-types tools/station-hardware-evidence/gate.mts
