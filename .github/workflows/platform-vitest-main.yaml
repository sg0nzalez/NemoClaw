name: CI / Platform Vitest Main Watch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs-preview-*.yaml"
      - "ISSUE_TEMPLATE/**"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

concurrency:
  group: platform-vitest-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-2604-contract:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04@sha256:b7f48194d4d8b763a478a621cdc81c27be222ba2206ca3ca6bc42b49685f3d9e
    timeout-minutes: 20
    steps:
      - name: Install runner dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils ca-certificates docker.io git python3
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Verify Ubuntu 26.04 userspace
        shell: bash
        run: |
          set -euo pipefail
          . /etc/os-release
          test "$ID" = "ubuntu"
          test "$VERSION_ID" = "26.04"
          command -v docker
          docker info --format 'server={{.ServerVersion}} os={{.OperatingSystem}}'
          command -v strings
          printf 'os=%s version=%s arch=%s\n' "$ID" "$VERSION_ID" "$(uname -m)"
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Run Ubuntu 26.04 compatibility contracts
        run: |
          npx vitest run --project cli \
            src/lib/onboard/preflight.test.ts \
            src/lib/onboard/preflight-ubuntu-2604.test.ts
          npx vitest run --project integration test/platform.test.ts
          npx vitest run --project installer-integration \
            --testTimeout 30000 \
            test/install-preflight.test.ts

  macos-vitest:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: ci/platform-vitest-macos-requirements.lock

      - name: Install macOS test dependencies
        run: |
          set -euo pipefail
          brew install bash coreutils fd gawk ripgrep
          printf '%s\n' \
            "$(brew --prefix bash)/bin" \
            "$(brew --prefix coreutils)/libexec/gnubin" \
            "$(brew --prefix gawk)/libexec/gnubin" \
            >>"$GITHUB_PATH"
          python -m pip install \
            --only-binary=:all: \
            --require-hashes \
            --requirement ci/platform-vitest-macos-requirements.lock

      - name: Show environment
        run: |
          set -euo pipefail
          echo "Runner: $(uname -a)"
          echo "Arch:   $(uname -m)"
          sw_vers
          bash --version | head -n 1
          node --version
          npm --version
          python --version
          python -c 'import setuptools, yaml; print(f"setuptools={setuptools.__version__} pyyaml={yaml.__version__}")'
          rg --version | head -n 1
          timeout --version | head -n 1
          stat --version | head -n 1
          awk --version | head -n 1

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          cd nemoclaw
          npm ci --ignore-scripts

      - name: Build CLI and plugin
        run: |
          npm run build:cli
          cd nemoclaw
          npm run build

      - name: Run full Vitest suite on macOS
        run: npx vitest run --testTimeout 60000

  wsl-vitest:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      WSL_DISTRO: Ubuntu
      WSL_TEST_USER: nemoclaw-ci
    steps:
      - name: Force LF line endings for checkout
        shell: powershell
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve workspace paths for WSL
        shell: powershell
        run: |
          $winPath = "${{ github.workspace }}"
          $drive = $winPath.Substring(0,1).ToLower()
          $rest = $winPath.Substring(2).Replace('\','/')
          $wslCheckoutPath = "/mnt/$drive$rest"
          $wslWorkdir = "/tmp/nemoclaw-wsl-vitest/${env:GITHUB_RUN_ID}-${env:GITHUB_RUN_ATTEMPT}"
          "WSL_CHECKOUT_DIR=$wslCheckoutPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WSL_WORKDIR=$wslWorkdir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "WSL_CHECKOUT_DIR=$wslCheckoutPath"
          Write-Host "WSL_WORKDIR=$wslWorkdir"

      - name: Ensure Ubuntu WSL exists
        shell: powershell
        run: |
          wsl --list --verbose 2>&1 | Out-Default
          $null = wsl -d $env:WSL_DISTRO -- echo ok 2>&1
          if ($LASTEXITCODE -ne 0) {
            $maxAttempts = 3
            $installed = $false
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              Write-Host "Ubuntu not found - installing via wsl --install (attempt $attempt/$maxAttempts)"
              wsl --install -d $env:WSL_DISTRO --no-launch --web-download
              $installExitCode = $LASTEXITCODE
              if ($installExitCode -eq 0) {
                wsl -d $env:WSL_DISTRO -- bash -c 'echo distro initialised'
                if ($LASTEXITCODE -eq 0) {
                  $installed = $true
                  break
                }
              }

              $null = wsl -d $env:WSL_DISTRO -- echo ok 2>&1
              if ($LASTEXITCODE -eq 0) {
                $installed = $true
                break
              }

              if ($attempt -lt $maxAttempts) {
                $null = wsl --unregister $env:WSL_DISTRO 2>&1
                Start-Sleep -Seconds ([Math]::Min(60, 20 * $attempt))
              }
            }

            if (-not $installed) {
              throw ("failed to install and initialize $env:WSL_DISTRO after $maxAttempts attempts")
            }
          }
          wsl --set-default $env:WSL_DISTRO
          if ($LASTEXITCODE -ne 0) {
            throw ('wsl --set-default failed with exit code ' + $LASTEXITCODE)
          }

      - name: Install Ubuntu dependencies
        shell: powershell
        run: |
          $script = @'
          set -euo pipefail
          test_user="${1:?missing WSL test user}"
          export DEBIAN_FRONTEND=noninteractive
          printf '%s\n' \
            'Acquire::ForceIPv4 "true";' \
            'Acquire::Retries "5";' \
            >/etc/apt/apt.conf.d/99github-actions-network
          apt-get update
          apt-get install -y bash ca-certificates curl git jq lsb-release make python3 python3-pip python3-venv ripgrep rsync tar unzip xz-utils
          if ! id -u "$test_user" >/dev/null 2>&1; then
            useradd --create-home --shell /bin/bash "$test_user"
          fi
          '@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user root -- bash -l $wslTmp $env:WSL_TEST_USER

      - name: Install Node.js 22 in WSL
        shell: powershell
        run: |
          $script = @'
          set -euo pipefail
          NODE_VERSION="22.19.0"
          arch="$(uname -m)"
          case "$arch" in
            x86_64) node_arch="x64"; node_sha="c0649af18e6a24f6fe5535a3e86b341dd49a8e71117c8b68bde973ef834f16f2" ;;
            aarch64|arm64) node_arch="arm64"; node_sha="0b2d9f564b6594222a62c82e1df2efe119dd4a4aff29644f4dd325bf360b6bcc" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          tarball="node-v${NODE_VERSION}-linux-${node_arch}.tar.xz"
          curl -fsSL -o "/tmp/${tarball}" "https://nodejs.org/dist/v${NODE_VERSION}/${tarball}"
          printf '%s  %s\n' "$node_sha" "/tmp/${tarball}" | sha256sum -c -
          tar -xJf "/tmp/${tarball}" -C /usr/local --strip-components=1
          node --version
          npm --version
          '@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user root -- bash -l $wslTmp

      - name: Copy checkout into WSL ext4 workspace
        shell: powershell
        run: |
          $checkout = $env:WSL_CHECKOUT_DIR
          $workdir = $env:WSL_WORKDIR
          $workdirParent = $workdir.Substring(0, $workdir.LastIndexOf('/'))
          $script = @"
          set -euo pipefail
          rm -rf '$workdir'
          mkdir -p '$workdirParent'
          rsync -a --no-owner --no-group --delete \
            --exclude '/node_modules/' \
            --exclude '/nemoclaw/node_modules/' \
            --exclude '/nemoclaw-blueprint/.venv/' \
            '$checkout'/ '$workdir'/
          git config --global --add safe.directory '$workdir'
          git -C '$workdir' reset --hard HEAD
          git -C '$workdir' clean -ffdx
          chown -R '$($env:WSL_TEST_USER):$($env:WSL_TEST_USER)' '$workdir'
          "@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user root -- bash -l $wslTmp

      - name: Install dependencies and build in WSL
        shell: powershell
        run: |
          $script = @"
          set -euo pipefail
          id -un | grep -Fxq '$env:WSL_TEST_USER'
          cd '$env:WSL_WORKDIR'
          npm ci --ignore-scripts
          npm run build:cli
          cd nemoclaw
          npm ci --ignore-scripts
          npm run build
          "@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user $env:WSL_TEST_USER -- bash -l $wslTmp

      - name: Run full Vitest suite in WSL
        shell: powershell
        run: |
          $script = @"
          set -euo pipefail
          id -un | grep -Fxq '$env:WSL_TEST_USER'
          cd '$env:WSL_WORKDIR'
          export NEMOCLAW_EXEC_TIMEOUT=60000
          export NEMOCLAW_TEST_TIMEOUT=60000
          npx vitest run --testTimeout 60000
          "@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user $env:WSL_TEST_USER -- bash -l $wslTmp

      - name: Run root-required Vitest contracts in WSL
        shell: powershell
        run: |
          $script = @"
          set -euo pipefail
          id -u | grep -Fxq '0'
          cd '$env:WSL_WORKDIR'
          if ! getent group sandbox >/dev/null; then
            groupadd --system sandbox
          fi
          if ! id -u sandbox >/dev/null 2>&1; then
            useradd --system --gid sandbox --home-dir /sandbox --shell /bin/bash sandbox
          fi
          install -d -o root -g root -m 0755 /usr/local/lib/nemoclaw
          install -o root -g root -m 0644 \
            scripts/lib/normalize_mutable_config_perms.py \
            /usr/local/lib/nemoclaw/normalize_mutable_config_perms.py
          npx vitest run --project integration \
            test/hermes-restart-config-seal-recovery.test.ts \
            -t 'keeps the locked Hermes entry sticky-protected|lets a sandbox-group peer create state'
          npx vitest run --project integration \
            test/nemoclaw-start-perms.test.ts \
            -t 'requires both fixed files to match|reclaims a root-owned collapsed config|leaves a root-owned recovery baseline untouched'
          "@
          $tmp = "$env:RUNNER_TEMP\wsl-step.sh"
          [IO.File]::WriteAllText($tmp, ($script -replace "`r",""), (New-Object System.Text.UTF8Encoding $false))
          $wslTmp = wsl -d $env:WSL_DISTRO -- wslpath -u ($tmp -replace '\\','/')
          wsl -d $env:WSL_DISTRO --user root -- bash -l $wslTmp
