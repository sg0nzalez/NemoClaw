#
# Scanner enablement and suppressions only. Gate severity (fail-on) is set in
# .github/workflows/muninn.yaml so the CI check and allowlist stay separate.
#
# Suppressions use finding fingerprints (or narrow path ids when a scanner
# cannot supply a stable fingerprint) with explicit expiration for review.

version: 1

scanners:
  gitleaks:
    enabled: true
  zizmor:
    enabled: true
  actionlint:
    enabled: true
  poutine:
    enabled: true
  semgrep:
    enabled: true
    rulesets:
      - p/security-audit
      - p/secrets
  osv-scanner:
    enabled: true
  trivy:
    enabled: true
    ignore-unfixed: true
  checkov:
    enabled: true
    # Sandbox/agent images intentionally omit HEALTHCHECK, may run as root for
    # OpenShell compatibility, and pin bases via digest outside "latest" checks.
    # workflow_dispatch inputs are required for maintainer-operated rebuilds.
    skip-checks:
      - CKV_DOCKER_2
      - CKV_DOCKER_3
      - CKV_DOCKER_7
      - CKV_DOCKER_8
      - CKV_GHA_7

